# docker-compose.yml
services:

  # ─── Base de Datos ───
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foodstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ───
  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/foodstore
      ADMIN_EMAIL: admin@foodstore.com
      ADMIN_PASSWORD: Admin123
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Espera a que la BD esté lista antes de arrancar
    command: >
      sh -c "
        echo '⏳ Esperando BD...' &&
        sleep 3 &&
        alembic upgrade head &&
        python -m app.db.seed &&
        echo '🚀 Backend listo!' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ─── Frontend (Vite) ───
  frontend:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: >
      sh -c "
        npm install &&
        npm run dev -- --host 0.0.0.0
      "

volumes:
  pgdata:
